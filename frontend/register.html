<!DOCTYPE html>
<html>
<head>
    <title>Register | Lost & Found</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="card">
    <h2>Register</h2>

    <input type="text" id="regUser" placeholder="Username">

    <p>

    <p id="msg" class="success"></p>

<script src="auth.js"></script>
</body>
</html>
